<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0E5C3F" />
    <meta name="theme-color" content="#0E5C3F" />
    <meta name="color-scheme" content="light" />

    <!-- Primary Meta -->
    <title>Malt — Trusted home services to your doorstep in Tallinn</title>
    <meta
      name="description"
      content="Malt brings verified home and garden services to your doorstep in Tallinn. Book lawn mowing, window washing, hedge trimming, snow removal and pressure washing in seconds. See the price before you book. Cashless. iOS & Android coming soon."
    />
    <meta name="keywords" content="Malt, home services Tallinn, lawn mowing Tallinn, window washing, hedge trimming, snow removal, pressure washing, Estonia, garden services app" />
    <meta name="author" content="Malt" />
    <link rel="canonical" href="https://malt.ee/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Malt" />
    <meta property="og:title" content="Malt — Trusted home services to your doorstep in Tallinn" />
    <meta
      property="og:description"
      content="Verified workers for lawn mowing, window washing, hedge trimming, snow removal and pressure washing. Order in seconds, see the price before you book. Launching in Tallinn."
    />
    <meta property="og:url" content="https://malt.ee/" />
    <meta property="og:locale" content="en_EE" />
    <meta property="og:image" content="https://malt.ee/og.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Malt — home services to your doorstep in Tallinn" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Malt — Trusted home services to your doorstep in Tallinn" />
    <meta
      name="twitter:description"
      content="Book verified workers for lawn mowing, window washing, hedge trimming, snow removal and pressure washing. Launching in Tallinn."
    />
    <meta name="twitter:image" content="https://malt.ee/og.svg" />

    <!-- Fonts: Fraunces (display, optical) + Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: LocalBusiness -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Malt",
        "description": "On-demand platform connecting Tallinn households with verified independent workers for outdoor and home maintenance services.",
        "url": "https://malt.ee/",
        "image": "https://malt.ee/og.svg",
        "email": "hello@malt.ee",
        "areaServed": {
          "@type": "City",
          "name": "Tallinn",
          "addressCountry": "EE"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Tallinn",
          "addressCountry": "EE"
        },
        "priceRange": "€€",
        "makesOffer": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Lawn mowing" }, "price": "35", "priceCurrency": "EUR" },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Window washing" }, "price": "30", "priceCurrency": "EUR" },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Hedge trimming" }, "price": "35", "priceCurrency": "EUR" },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Snow removal" }, "price": "35", "priceCurrency": "EUR" },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Pressure washing" }, "price": "45", "priceCurrency": "EUR" }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
