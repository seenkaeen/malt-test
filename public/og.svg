<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Malt — home services to your doorstep in Tallinn">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E5C3F" />
      <stop offset="1" stop-color="#072A1D" />
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#46C98B" />
      <stop offset="1" stop-color="#0E5C3F" />
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E5C3F" stop-opacity="0" />
      <stop offset="1" stop-color="#0A3D2A" stop-opacity="0.6" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- soft glow -->
  <circle cx="980" cy="150" r="220" fill="#46C98B" opacity="0.16" />

  <!-- scene: lawn + house -->
  <g>
    <rect x="0" y="470" width="1200" height="160" fill="#0C4A33" />
    <g opacity="0.5" fill="#0E5C3F">
      <rect x="0" y="470" width="120" height="160" />
      <rect x="240" y="470" width="120" height="160" />
      <rect x="480" y="470" width="120" height="160" />
      <rect x="720" y="470" width="120" height="160" />
      <rect x="960" y="470" width="120" height="160" />
    </g>
    <!-- house -->
    <g transform="translate(150 300)">
      <rect x="0" y="60" width="190" height="120" rx="6" fill="#F5F4EE" />
      <path d="M-16 64 L95 -4 L206 64 Z" fill="#E7E4D8" />
      <rect x="36" y="92" width="42" height="42" rx="4" fill="#0E5C3F" />
      <rect x="112" y="92" width="42" height="42" rx="4" fill="#E8B45C" />
      <rect x="78" y="138" width="36" height="42" rx="4" fill="#0E5C3F" />
    </g>
  </g>

  <rect x="0" y="380" width="1200" height="250" fill="url(#sky)" />

  <!-- brand mark -->
  <g transform="translate(110 96)">
    <rect width="84" height="84" rx="22" fill="url(#tile)" />
    <g transform="translate(26 24) scale(1.35)" fill="#F5F4EE">
      <path d="M16 19 C 12.5 19.5, 8.8 16.5, 8 11 C 13 11.2, 16 14.8, 16 19 Z" />
      <path d="M16 16 C 19.5 16.5, 23.2 13.5, 24 8 C 19 8.2, 16 11.8, 16 16 Z" opacity="0.92" />
      <path d="M16 26 C 16 21, 16 17, 16 12" fill="none" stroke="#F5F4EE" stroke-width="2.3" stroke-linecap="round" />
    </g>
  </g>

  <text x="218" y="138" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#F5F4EE">Malt</text>
  <text x="220" y="176" font-family="Helvetica, Arial, sans-serif" font-size="22" letter-spacing="2" fill="#9FD9BD">HOME SERVICES · TALLINN</text>

  <text x="110" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="600" fill="#F5F4EE">Trusted home services,</text>
  <text x="110" y="338" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="600" fill="#F5F4EE">to your <tspan fill="#7FE3B0" font-style="italic">doorstep.</tspan></text>

  <g transform="translate(770 92)">
    <rect width="320" height="64" rx="32" fill="#F5F4EE" />
    <text x="160" y="41" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#0E5C3F">Join early access →</text>
  </g>
</svg>
